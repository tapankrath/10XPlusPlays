<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Sharp square background, no radius -->
  <rect width="192" height="192" fill="#111111"/>
  <!-- Top rule line -->
  <rect x="20" y="20" width="152" height="3" fill="rgba(255,255,255,0.13)"/>
  <!-- Chart bars — 6 bars, varying heights, green/red -->
  <rect x="20" y="112" width="20" height="60" fill="#22a04d"/>
  <rect x="46" y="88"  width="20" height="84" fill="#22a04d"/>
  <rect x="72" y="100" width="20" height="72" fill="#e02020"/>
  <rect x="98" y="62"  width="20" height="110" fill="#22a04d"/>
  <rect x="124" y="78" width="20" height="94"  fill="#e02020"/>
  <rect x="150" y="44" width="22" height="128" fill="#22a04d"/>
  <!-- Shadow offset border — gives depth -->
  <rect x="5" y="5" width="182" height="182" fill="none" stroke="#22a04d" stroke-width="2" opacity="0.4"/>
</svg>
